name: Quality gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deterministic-checks:
    name: First-timer and evaluator checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Repository contract
        run: bash scripts/check-repo.sh
      - name: Trace adapter regressions
        run: python3 scripts/test_trace_adapter.py
      - name: Evaluator entrypoint regressions
        run: python3 scripts/test_eval_entrypoint.py
      - name: Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Public evidence report
        run: python3 scripts/validate_agent_report.py evals/agent-harness/evidence/controlled-real-run/report.json

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        run: npx --yes markdownlint-cli@0.39.0 "**/*.md" --ignore node_modules
